<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stego AI — Detection Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg:        #080b10;
    --bg2:       #0c1018;
    --surface:   rgba(255,255,255,0.04);
    --surface2:  rgba(255,255,255,0.07);
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.14);
    --accent:    #00e5a0;
    --accent2:   #00b87a;
    --red:       #ff5252;
    --amber:     #ffb300;
    --blue:      #448aff;
    --text:      #eef0f5;
    --text2:     rgba(238,240,245,0.5);
    --text3:     rgba(238,240,245,0.28);
    --mono:      'JetBrains Mono', monospace;
    --display:   'Syne', sans-serif;
    --r-sm:      8px;
    --r-md:      12px;
    --r-lg:      18px;
    --r-xl:      24px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orb top-left */
  body::after {
    content: '';
    position: fixed;
    top: -180px;
    left: -120px;
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(0,229,160,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Navbar ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    height: 62px;
    background: rgba(8,11,16,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .nav-logo {
    width: 34px;
    height: 34px;
    border-radius: var(--r-sm);
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .nav-logo-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    animation: throb 2.2s ease-in-out infinite;
  }

  @keyframes throb {
    0%,100%{ box-shadow: 0 0 0 0 rgba(0,229,160,0.5); }
    50%{ box-shadow: 0 0 0 5px rgba(0,229,160,0); }
  }

  .nav-wordmark {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
  }

  .nav-tag {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--accent);
    letter-spacing: 0.15em;
    opacity: 0.7;
    margin-top: 2px;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-link {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 15px;
    border-radius: var(--r-sm);
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.18s;
    line-height: 1;
  }

  .nav-link-ghost {
    color: var(--text2);
    border-color: var(--border);
    background: transparent;
  }

  .nav-link-ghost:hover {
    color: var(--text);
    border-color: var(--border2);
    background: var(--surface2);
  }

  .nav-link-accent {
    color: var(--bg);
    background: var(--accent);
    font-weight: 700;
    border-color: var(--accent);
  }

  .nav-link-accent:hover {
    background: #33edb5;
    border-color: #33edb5;
  }

  /* ── Status bar ── */
  .statusbar {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 6px 2.5rem;
    background: rgba(0,229,160,0.03);
    border-bottom: 1px solid rgba(0,229,160,0.07);
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(0,229,160,0.45);
    letter-spacing: 0.1em;
    flex-wrap: wrap;
  }

  .statusbar-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 5px;
    animation: blink 1.6s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── Page wrapper ── */
  .page {
    position: relative;
    z-index: 5;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
  }

  .container-sm {
    max-width: 460px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
  }

  /* ── Glass card ── */
  .glass {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 1.75rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .glass:hover { border-color: rgba(0,229,160,0.18); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    padding: 10px 22px;
    border-radius: var(--r-sm);
    border: 1px solid transparent;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.18s;
    line-height: 1;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .btn-primary:hover { background: #33edb5; border-color: #33edb5; transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    color: var(--text2);
    border-color: var(--border2);
  }

  .btn-outline:hover { color: var(--text); border-color: rgba(0,229,160,0.4); background: rgba(0,229,160,0.06); }

  .btn-danger {
    background: rgba(255,82,82,0.12);
    color: var(--red);
    border-color: rgba(255,82,82,0.25);
  }

  .btn-danger:hover { background: rgba(255,82,82,0.2); }

  .btn-full { width: 100%; }
  .btn-lg { padding: 13px 28px; font-size: 15px; }

  /* ── Form inputs ── */
  .form-group { margin-bottom: 1rem; }

  .form-label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text3);
    margin-bottom: 7px;
    text-transform: uppercase;
  }

  .form-input {
    width: 100%;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border2);
    border-radius: var(--r-sm);
    padding: 11px 14px;
    font-family: var(--display);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }

  .form-input::placeholder { color: var(--text3); }

  .form-input:focus {
    border-color: rgba(0,229,160,0.5);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
  }

  /* ── Tag / badge ── */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .tag-green  { background: rgba(0,229,160,0.1);  color: var(--accent); }
  .tag-red    { background: rgba(255,82,82,0.1);   color: var(--red); }
  .tag-amber  { background: rgba(255,179,0,0.1);   color: var(--amber); }
  .tag-blue   { background: rgba(68,138,255,0.12); color: var(--blue); }
  .tag-muted  { background: rgba(255,255,255,0.07);color: var(--text2); }

  .tag-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* ── Utility ── */
  .mono { font-family: var(--mono); }
  .muted { color: var(--text2); }
  .accent-text { color: var(--accent); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  /* ── Page-entry animation ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fade-up { animation: fadeUp 0.45s ease both; }
  .fade-up-1 { animation-delay: 0.05s; }
  .fade-up-2 { animation-delay: 0.12s; }
  .fade-up-3 { animation-delay: 0.19s; }
  .fade-up-4 { animation-delay: 0.26s; }

  /* ── Footer ── */
  .site-footer {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.14em;
  }

  @media (max-width: 640px) {
    .nav { padding: 0 1rem; }
    .container, .container-sm { padding: 1.5rem 1rem; }
    .statusbar { display: none; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">
    <div class="nav-logo"><div class="nav-logo-dot"></div></div>
    <div>
      <div class="nav-wordmark">STEGO AI</div>
      <div class="nav-tag">DETECTION ENGINE</div>
    </div>
  </a>
  <div class="nav-links">
    <a href="/dashboard" class="nav-link nav-link-ghost">Dashboard</a>
    <a href="/history"   class="nav-link nav-link-ghost">History</a>
    <a href="/upload"    class="nav-link nav-link-accent">Scan Image</a>
  </div>
</nav>

<div class="statusbar">
  <span><span class="statusbar-dot"></span>SYSTEM ONLINE</span>
  <span>MODEL: StegoNet-7B</span>
  <span>ACCURACY: 99.2%</span>
  <span>QUEUE: 0 JOBS</span>
</div>

<div class="page">
  {% block content %}{% endblock %}
</div>

<footer class="site-footer">
  STEGO AI &nbsp;·&nbsp; STEGANOGRAPHY DETECTION ENGINE &nbsp;·&nbsp; ALL RIGHTS RESERVED
</footer>

</body>
</html>
