{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width:680px">

  <!-- Page header -->
  <div class="fade-up" style="margin-bottom:2rem">
    <div class="mono" style="font-size:9px;letter-spacing:0.18em;color:rgba(0,229,160,0.5);margin-bottom:8px;display:flex;align-items:center;gap:6px">
      <span style="width:14px;height:1px;background:var(--accent);display:inline-block;opacity:.5"></span>
      IMAGE ANALYSIS
    </div>
    <h1 style="font-size:28px;font-weight:800;letter-spacing:-0.02em">
      Upload <span style="color:var(--accent)">Image</span>
    </h1>
    <p style="font-size:14px;color:var(--text2);margin-top:6px">Submit an image for steganography detection. Supports PNG, JPG, BMP, and GIF.</p>
  </div>

  <div class="glass fade-up fade-up-1" style="padding:2rem">

    <form method="POST" action="/analyze" enctype="multipart/form-data" id="uploadForm">

      <!-- Drop zone -->
      <div id="dropZone" style="border:1.5px dashed rgba(0,229,160,0.25);border-radius:var(--r-md);padding:3rem 2rem;text-align:center;cursor:pointer;background:rgba(0,229,160,0.02);transition:all .25s;position:relative;overflow:hidden;margin-bottom:1.5rem"
           onclick="document.getElementById('fileInput').click()"
           ondragover="event.preventDefault();this.style.borderColor='var(--accent)';this.style.background='rgba(0,229,160,0.07)'"
           ondragleave="this.style.borderColor='rgba(0,229,160,0.25)';this.style.background='rgba(0,229,160,0.02)'"
           ondrop="handleDrop(event)">

        <!-- Preview (hidden until file chosen) -->
        <img id="previewImg" style="display:none;max-width:100%;max-height:220px;border-radius:var(--r-sm);margin-bottom:16px;border:1px solid var(--border)">

        <!-- Default state -->
        <div id="dropDefault">
          <div style="width:52px;height:52px;border-radius:14px;background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 3v12M6.5 7.5L11 3l4.5 4.5M3 17h16v1a1 1 0 01-1 1H4a1 1 0 01-1-1v-1z" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div style="font-size:15px;font-weight:700;margin-bottom:6px">Drop your image here</div>
          <div class="mono" style="font-size:11px;color:var(--text3)">or click to browse · PNG · JPG · BMP · GIF · max 50MB</div>
        </div>

        <input type="file" id="fileInput" name="image" accept="image/*" style="display:none" onchange="handleFile(this)" required>
      </div>

      <!-- File info bar (hidden until selected) -->
      <div id="fileInfo" style="display:none;background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.18);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:1.5rem;display:none;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:10px">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="11" height="11" rx="2" stroke="var(--accent)" stroke-width="1.2"/><circle cx="5" cy="5.5" r="1.2" fill="var(--accent)" opacity=".7"/><path d="M1.5 9.5l3-2.5 2.5 2 2-1.5 2.5 2" stroke="var(--accent)" stroke-width="1.1" stroke-linecap="round"/></svg>
          <span id="fileName" class="mono" style="font-size:11px;color:var(--accent)">filename.png</span>
        </div>
        <span id="fileSize" class="mono" style="font-size:10px;color:var(--text3)">0 KB</span>
      </div>

      <!-- Analysis options -->
      <div style="margin-bottom:1.5rem">
        <div class="mono" style="font-size:9px;letter-spacing:.14em;color:var(--text3);margin-bottom:10px">DETECTION METHODS</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <label style="display:flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='rgba(0,229,160,0.35)'" onmouseout="this.style.borderColor='var(--border2)'">
            <input type="checkbox" name="method_lsb" checked style="accent-color:var(--accent)"> LSB Analysis
          </label>
          <label style="display:flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='rgba(0,229,160,0.35)'" onmouseout="this.style.borderColor='var(--border2)'">
            <input type="checkbox" name="method_dct" checked style="accent-color:var(--accent)"> DCT Analysis
          </label>
          <label style="display:flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='rgba(0,229,160,0.35)'" onmouseout="this.style.borderColor='var(--border2)'">
            <input type="checkbox" name="method_entropy" checked style="accent-color:var(--accent)"> Entropy Check
          </label>
          <label style="display:flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='rgba(0,229,160,0.35)'" onmouseout="this.style.borderColor='var(--border2)'">
            <input type="checkbox" name="method_neural" checked style="accent-color:var(--accent)"> Neural Model
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="submitBtn" style="height:48px;font-size:15px;opacity:.5;pointer-events:none" disabled>
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2v8M4 6L7.5 2l3.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Analyze Image
      </button>

    </form>
  </div>

</div>

<script>
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = document.getElementById('previewImg');
  img.src = url;
  img.style.display = 'block';
  document.getElementById('dropDefault').style.display = 'none';
  const info = document.getElementById('fileInfo');
  info.style.display = 'flex';
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
  const btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.style.opacity = '1';
  btn.style.pointerEvents = 'auto';
}

function handleDrop(e) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  const dt = new DataTransfer();
  dt.items.add(file);
  const input = document.getElementById('fileInput');
  input.files = dt.files;
  handleFile(input);
  document.getElementById('dropZone').style.borderColor = 'rgba(0,229,160,0.25)';
  document.getElementById('dropZone').style.background = 'rgba(0,229,160,0.02)';
}
</script>
{% endblock %}
