{% extends "base.html" %}

{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem">
  <div style="width:100%;max-width:420px">

    <!-- Header -->
    <div class="fade-up" style="text-align:center;margin-bottom:2rem">
      <div style="width:52px;height:52px;border-radius:14px;background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="9" cy="8" r="4" stroke="var(--accent)" stroke-width="1.6"/><path d="M3 20c0-4.4 3-7.5 6-8M15 14v6M18 17h-6" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <h1 style="font-size:26px;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px">Create account</h1>
      <p style="font-size:14px;color:var(--text2)">Join Stego AI and start detecting hidden data</p>
    </div>

    <!-- Card -->
    <div class="glass fade-up fade-up-1" style="padding:2rem">

      {% if error %}
      <div style="background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.25);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:1.25rem;display:flex;align-items:center;gap:9px">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="var(--red)" stroke-width="1.3"/><path d="M7 4.5v3M7 9.5v.5" stroke="var(--red)" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span style="font-size:13px;color:var(--red)">{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST">

        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" placeholder="Choose a username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Create a strong password" required autocomplete="new-password">
        </div>

        <div class="form-group" style="margin-bottom:1.5rem">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-input" placeholder="Repeat your password" autocomplete="new-password">
        </div>

        <!-- Password hint -->
        <div style="background:rgba(0,229,160,0.05);border:1px solid rgba(0,229,160,0.12);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:1.5rem;display:flex;align-items:flex-start;gap:8px">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="flex-shrink:0;margin-top:1px"><circle cx="6.5" cy="6.5" r="5.5" stroke="var(--accent)" stroke-width="1.2"/><path d="M6.5 4v4M6.5 9.5v.3" stroke="var(--accent)" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span style="font-size:11px;color:var(--text2);line-height:1.55">Use at least 8 characters with a mix of letters, numbers, and symbols.</span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="height:44px;font-size:14px">
          Create Account
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

      </form>

      <div class="divider"></div>

      <p style="text-align:center;font-size:13px;color:var(--text2)">
        Already have an account?
        <a href="/login" style="color:var(--accent);text-decoration:none;font-weight:700"> Sign in →</a>
      </p>

    </div>

  </div>
</div>
{% endblock %}
